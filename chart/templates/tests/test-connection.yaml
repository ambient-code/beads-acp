apiVersion: v1
kind: Pod
metadata:
  name: {{ include "beads-acp.fullname" . }}-test-connection
  labels:
    {{- include "beads-acp.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: test-dolt
      image: "{{ .Values.mcp.image.repository }}:{{ .Values.mcp.image.tag }}"
      command: ['python3.11', '-c']
      args:
        - |
          import socket, sys
          tests = [
              ("{{ include "beads-acp.fullname" . }}-dolt", {{ .Values.dolt.port }}, "Dolt"),
              ("{{ include "beads-acp.fullname" . }}-mcp", {{ .Values.mcp.port }}, "MCP"),
          ]
          for host, port, name in tests:
              try:
                  s = socket.create_connection((host, port), timeout=10)
                  s.close()
                  print(f"{name}: OK")
              except Exception as e:
                  print(f"{name}: FAILED ({e})")
                  sys.exit(1)
          print("All connectivity tests passed.")
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
