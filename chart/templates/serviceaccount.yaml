apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "beads-acp.serviceAccountName" (dict "component" "dolt" "context" .) }}
  labels:
    {{- include "beads-acp.componentLabels" (dict "component" "dolt" "context" .) | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "beads-acp.serviceAccountName" (dict "component" "mcp" "context" .) }}
  labels:
    {{- include "beads-acp.componentLabels" (dict "component" "mcp" "context" .) | nindent 4 }}
  {{- if .Values.oauthProxy.enabled }}
  annotations:
    serviceaccounts.openshift.io/oauth-redirecturi.primary: https://
  {{- end }}
automountServiceAccountToken: {{ .Values.oauthProxy.enabled }}
