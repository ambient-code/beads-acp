apiVersion: v1
kind: Service
metadata:
  name: {{ include "beads-acp.fullname" . }}-dolt
  labels:
    {{- include "beads-acp.componentLabels" (dict "component" "dolt" "context" .) | nindent 4 }}
  annotations:
    {{- if .Values.dolt.tls.enabled }}
    service.beta.openshift.io/serving-cert-secret-name: {{ .Values.dolt.tls.secretName }}
    {{- end }}
spec:
  type: ClusterIP
  ipFamilyPolicy: PreferDualStack
  ports:
    - port: {{ .Values.dolt.port }}
      targetPort: mysql
      protocol: TCP
      name: mysql
  selector:
    {{- include "beads-acp.componentSelectorLabels" (dict "component" "dolt" "context" .) | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "beads-acp.fullname" . }}-dolt-headless
  labels:
    {{- include "beads-acp.componentLabels" (dict "component" "dolt" "context" .) | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ipFamilyPolicy: PreferDualStack
  ports:
    - port: {{ .Values.dolt.port }}
      targetPort: mysql
      protocol: TCP
      name: mysql
  selector:
    {{- include "beads-acp.componentSelectorLabels" (dict "component" "dolt" "context" .) | nindent 4 }}
