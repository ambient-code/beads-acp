{{- $secretName := printf "%s-dolt-credentials" (include "beads-acp.fullname" .) }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "beads-acp.componentLabels" (dict "component" "dolt" "context" .) | nindent 4 }}
type: Opaque
data:
  {{- if $existingSecret }}
  BEADS_DOLT_PASSWORD: {{ index $existingSecret.data "BEADS_DOLT_PASSWORD" }}
  {{- else }}
  BEADS_DOLT_PASSWORD: {{ randAlphaNum 24 | b64enc | quote }}
  {{- end }}
{{- if .Values.oauthProxy.enabled }}
---
{{- $cookieSecretName := printf "%s-oauth-cookie" (include "beads-acp.fullname" .) }}
{{- $existingCookie := lookup "v1" "Secret" .Release.Namespace $cookieSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $cookieSecretName }}
  labels:
    {{- include "beads-acp.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existingCookie (index $existingCookie.data "cookie-secret") }}
  cookie-secret: {{ index $existingCookie.data "cookie-secret" }}
  {{- else if .Values.oauthProxy.cookieSecret }}
  cookie-secret: {{ .Values.oauthProxy.cookieSecret | b64enc | quote }}
  {{- else }}
  cookie-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
